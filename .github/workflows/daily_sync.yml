name: Daily Influenza HDC Sync

on:
  schedule:
    # Multiple cron times for reliability (GitHub Actions free tier may skip/delay cron runs)
    - cron: '0 2 * * *'    # Primary:  09:00 AM Thailand Time
    - cron: '30 3 * * *'   # Backup 1: 10:30 AM Thailand Time
    - cron: '0 5 * * *'    # Backup 2: 12:00 PM Thailand Time
  workflow_dispatch: # Allows manual trigger from the Actions tab

# Prevent multiple runs from overlapping
concurrency:
  group: daily-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check if already synced today
        id: check_done
        if: github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const { data } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'daily_sync.yml',
              status: 'success',
              created: `>=${today}T00:00:00Z`,
              per_page: 1
            });
            const alreadyDone = data.total_count > 0;
            console.log(`Successful runs today: ${data.total_count}. Skip: ${alreadyDone}`);
            core.setOutput('skip', alreadyDone ? 'true' : 'false');

      - name: Skip notification
        if: steps.check_done.outputs.skip == 'true'
        run: echo "✅ Already synced successfully today. Skipping this backup run."

      - name: Checkout repository
        if: steps.check_done.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Setup uv
        if: steps.check_done.outputs.skip != 'true'
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install Playwright Browsers
        if: steps.check_done.outputs.skip != 'true'
        run: |
          uv pip install playwright openpyxl
          uv run playwright install chromium --with-deps

      - name: Configure Git
        if: steps.check_done.outputs.skip != 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Install OpenVPN
        if: steps.check_done.outputs.skip != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y openvpn

      - name: Connect to Thailand VPN
        if: steps.check_done.outputs.skip != 'true'
        run: |
          python vpn_connect.py

      - name: Run NHSO Sync Script
        if: steps.check_done.outputs.skip != 'true'
        env:
          TZ: Asia/Bangkok
        run: |
          uv run sync_nhso_influenza.py
